name: Refresh AlphaRank Results

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write

jobs:
  refresh-results:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance xgboost scikit-learn

      - name: Refresh results.csv
        run: python update_results.py

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results.csv
          git diff --staged --quiet || git commit -m "Auto-refresh results.csv"

      - name: Push changes
        run: git push

