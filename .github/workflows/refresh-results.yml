name: Refresh AlphaRank Results

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  refresh-results:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance xgboost scikit-learn streamlit altair
      - name: Run model refresh
        run: python update_results_with_reporting.py
      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results_core.csv results_ftse.csv results_us.csv results_europe.csv performance_history.csv failed_tickers.csv weekly_summary.csv benchmark_summary.csv
          git diff --staged --quiet || git commit -m "Auto-refresh results, weekly summary, and benchmarking"
      - name: Push changes
        run: git push
